<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>My Tasks</h2>
      <a routerLink="/tasks/new" class="btn btn-primary">+ Add New Task</a>
    </div>
  
    <table class="table table-striped table-hover border">
      <thead class="table-dark">
        <tr>
          <th>Title</th>
          <th>Due Date</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let task of tasks">
          <td>{{ task.title }}</td>
          <td>{{ task.dueDate }}</td>
          <td>
            <span class="badge" [ngClass]="{
              'bg-danger': task.priority === 'High',
              'bg-warning text-dark': task.priority === 'Medium',
              'bg-info': task.priority === 'Low'
            }">{{ task.priority }}</span>
          </td>
          <td>
            <span class="badge" [ngClass]="task.status === 'Completed' ? 'bg-success' : 'bg-secondary'">
              {{ task.status }}
            </span>
          </td>
          <td>
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-success" (click)="onToggle(task.id)">Toggle</button>
              <a [routerLink]="['/tasks', task.id]" class="btn btn-outline-primary">Details</a>
              <button class="btn btn-outline-danger" (click)="onDelete(task.id)">Delete</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
